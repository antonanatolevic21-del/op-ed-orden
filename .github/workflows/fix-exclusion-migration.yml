name: Fix exclusion migration

on:
  push:
    paths:
      - '.github/workflows/fix-exclusion-migration.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Do not invert legacy positive filters
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('events-app.js')
          text = path.read_text(encoding='utf-8')
          old = '''    function normalizeGameExclusions(raw = {}) {
      const current = Array.isArray(raw.excludedEntities) ? raw.excludedEntities : [];
      const legacy = [
        ['studio', raw.studio],
        ['director', raw.director],
        ['performer', raw.performer],
        ['franchise', raw.franchise]
      ].filter(([, value]) => String(value || '').trim()).map(([kind, value]) => `${kind}::${String(value).trim()}`);
      return [...new Set([...current, ...legacy].map(String).filter(value => value.includes('::')))];
    }'''
          new = '''    function normalizeGameExclusions(raw = {}) {
      const current = Array.isArray(raw.excludedEntities) ? raw.excludedEntities : [];
      return [...new Set(current.map(String).filter(value => value.includes('::')))];
    }'''
          if text.count(old) != 1:
              raise RuntimeError(f'exclusion migration block matches: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          html_path = Path('events.html')
          html = html_path.read_text(encoding='utf-8')
          html = html.replace('events-app.js?v=20260724-exclusion-filter1', 'events-app.js?v=20260724-exclusion-filter2')
          html_path.write_text(html, encoding='utf-8')
          PY
          node --check events-app.js
      - name: Commit fix
        shell: bash
        run: |
          rm -f .github/workflows/fix-exclusion-migration.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Keep new game exclusions empty by default'
          git push
