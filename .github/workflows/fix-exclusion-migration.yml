name: Fix exclusion migration

on:
  push:
    paths:
      - '.github/workflows/fix-exclusion-migration.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Do not invert legacy positive filters
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('events-app.js')
          text = path.read_text(encoding='utf-8')
          pattern = r"    function normalizeGameExclusions\(raw = \{\}\) \{\n(?:.*\n){1,12}?    \}"
          replacement = "    function normalizeGameExclusions(raw = {}) {\n      const current = Array.isArray(raw.excludedEntities) ? raw.excludedEntities : [];\n      return [...new Set(current.map(String).filter(value => value.includes('::')))];\n    }"
          text, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise RuntimeError(f'exclusion migration block matches: {count}')
          path.write_text(text, encoding='utf-8')

          html_path = Path('events.html')
          html = html_path.read_text(encoding='utf-8')
          html = html.replace('events-app.js?v=20260724-exclusion-filter1', 'events-app.js?v=20260724-exclusion-filter2')
          html_path.write_text(html, encoding='utf-8')
          PY
          node --check events-app.js
      - name: Commit fix
        shell: bash
        run: |
          rm -f .github/workflows/fix-exclusion-migration.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Keep new game exclusions empty by default'
          git push
