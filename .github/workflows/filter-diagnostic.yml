name: Filter diagnostic

on:
  push:
    paths:
      - '.github/workflows/filter-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect filter contexts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          src = Path('events-app.js').read_text(encoding='utf-8').splitlines()
          needles = [
              'guessFilters.studio', 'guessFilters.director', 'guessFilters.performer', 'guessFilters.franchise',
              'blindTierFilters.studio', 'blindTierFilters.director', 'blindTierFilters.performer', 'blindTierFilters.franchise',
              'bestWorstFilters.studio', 'bestWorstFilters.director', 'bestWorstFilters.performer',
              'settings.studio', 'settings.director', 'settings.performer', 'settings.franchise',
              'ev-guess-studio', 'ev-guess-director', 'ev-guess-performer', 'ev-guess-franchise',
              'ev-blind-studio', 'ev-blind-director', 'ev-blind-performer', 'ev-blind-franchise',
              'ev-bw-studio', 'ev-bw-director', 'ev-bw-performer', 'ev-bw-franchise'
          ]
          hits = []
          for i, line in enumerate(src, 1):
              if any(n in line for n in needles):
                  start = max(1, i - 5)
                  end = min(len(src), i + 8)
                  hits.append(f'\n===== lines {start}-{end} (hit {i}) =====\n')
                  hits.extend(f'{n:05d}: {src[n-1]}\n' for n in range(start, end + 1))
          Path('FILTER_DIAGNOSTIC.txt').write_text(''.join(hits), encoding='utf-8')
          PY
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILTER_DIAGNOSTIC.txt
          git commit -m 'Add game filter diagnostic' || exit 0
          git push
