name: Debug filter upgrade

on:
  push:
    paths:
      - '.github/workflows/debug-filter-upgrade.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run embedded patch and capture error
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-filter-upgrade.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/filter_patch.py').write_text(script, encoding='utf-8')
          PY
          set +e
          python /tmp/filter_patch.py > /tmp/PATCH_DEBUG.txt 2>&1
          code=$?
          echo "EXIT_CODE=$code" >> /tmp/PATCH_DEBUG.txt
          git reset --hard HEAD
          cp /tmp/PATCH_DEBUG.txt PATCH_DEBUG.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add PATCH_DEBUG.txt
          git commit -m 'Record filter upgrade diagnostic' || exit 0
          git push
