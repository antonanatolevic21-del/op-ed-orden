name: Apply filter UI v2

on:
  push:
    paths:
      - '.github/workflows/apply-filter-ui-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply UI patch
        shell: bash
        run: |
          echo ' ' | base64 -d > /tmp/filter-ui-v2.py
          python /tmp/filter-ui-v2.py
          node --check events-app.js
          grep -q 'Main season range layout v2' index.css
          grep -q 'Game exclusion picker v2' events.css
          grep -q 'gameExclusionPickerMarkup' events-app.js
      - name: Commit changes
        shell: bash
        run: |
          rm -f .github/workflows/apply-filter-ui-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Improve range and exclusion filter UI'
          git push