name: Connect filter UI assets

on:
  push:
    paths:
      - '.github/workflows/apply-filter-ui-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect styles and scripts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index = index.replace('sw-register.js?v=20260724-filter-range1', 'sw-register.js?v=20260724-filter-ui3')
          index_path.write_text(index, encoding='utf-8')

          events_path = Path('events.html')
          events = events_path.read_text(encoding='utf-8')
          css_link = '  <link rel="stylesheet" href="filter-ui-fixes.css?v=20260724-filter-ui3" />\n'
          if 'filter-ui-fixes.css' not in events:
              events = events.replace('  <link rel="stylesheet" href="events.css?v=20260724-exclusion-filter1" />\n', '  <link rel="stylesheet" href="events.css?v=20260724-exclusion-filter1" />\n' + css_link)
          script = '  <script src="event-exclusion-ui.js?v=20260724-filter-ui3" defer></script>\n'
          if 'event-exclusion-ui.js' not in events:
              events = events.replace('  <script type="module" src="events-app.js?v=20260724-exclusion-filter2"></script>\n', '  <script type="module" src="events-app.js?v=20260724-exclusion-filter2"></script>\n' + script)
          events_path.write_text(events, encoding='utf-8')
          PY
          node --check event-exclusion-ui.js
      - name: Commit changes
        shell: bash
        run: |
          rm -f .github/workflows/apply-filter-ui-v2.yml
          rm -f scripts/filter-ui-v2.b64.*
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Connect improved filter interfaces'
          git push
