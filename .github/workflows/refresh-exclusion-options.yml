name: Refresh exclusion options

on:
  push:
    paths:
      - '.github/workflows/refresh-exclusion-options.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply live option refresh
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/refresh_exclusion_options.py
          python /tmp/refresh_exclusion_options.py
          node --check event-exclusion-ui.js
      - name: Commit changes
        shell: bash
        run: |
          rm -f .github/workflows/refresh-exclusion-options.yml
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Refresh game exclusion options from live cards'
          git push
