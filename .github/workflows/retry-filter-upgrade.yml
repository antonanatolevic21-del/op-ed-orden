name: Retry filter upgrade

on:
  push:
    paths:
      - '.github/workflows/retry-filter-upgrade.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and relax sequential replacement check
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-filter-upgrade.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          output = []
          in_triple = False
          for line in lines:
              output.append(line if in_triple else (line[10:] if line.startswith('          ') else line))
              if line.count("'''") % 2:
                  in_triple = not in_triple
          script = '\n'.join(output) + '\n'
          script = script.replace("if count != 1:\n        raise RuntimeError(f'{label}: expected one match, got {count}')", "if count < 1:\n        raise RuntimeError(f'{label}: expected at least one match, got {count}')")
          Path('/tmp/filter_patch.py').write_text(script, encoding='utf-8')
          PY
      - name: Apply and validate
        shell: bash
        run: |
          set +e
          python /tmp/filter_patch.py > /tmp/FILTER_UPGRADE_LOG.txt 2>&1
          code=$?
          if [ "$code" -eq 0 ]; then node --check index-app.js >> /tmp/FILTER_UPGRADE_LOG.txt 2>&1; code=$?; fi
          if [ "$code" -eq 0 ]; then node --check events-app.js >> /tmp/FILTER_UPGRADE_LOG.txt 2>&1; code=$?; fi
          if [ "$code" -eq 0 ]; then
            grep -q 'id="oc-f-from-year"' index.html || code=1
            grep -q 'id="oc-f-to-season"' index.html || code=1
            grep -q 'id="ev-guess-excluded"' events-app.js || code=1
            grep -q 'id="ev-bw-excluded"' events-app.js || code=1
            grep -q 'id="ev-blind-excluded"' events-app.js || code=1
          fi
          if [ "$code" -ne 0 ]; then
            echo "EXIT_CODE=$code" >> /tmp/FILTER_UPGRADE_LOG.txt
            git reset --hard HEAD
            cp /tmp/FILTER_UPGRADE_LOG.txt PATCH_DEBUG_3.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add PATCH_DEBUG_3.txt
            git commit -m 'Record third filter upgrade diagnostic' || true
            git push
            exit 0
          fi
          rm -f FILTER_DIAGNOSTIC.txt PATCH_DEBUG.txt PATCH_DEBUG_2.txt PATCH_DEBUG_3.txt
          rm -f .github/workflows/filter-diagnostic.yml
          rm -f .github/workflows/debug-filter-upgrade.yml
          rm -f .github/workflows/apply-filter-upgrade.yml
          rm -f .github/workflows/run-filter-upgrade.yml
          rm -f .github/workflows/retry-filter-upgrade.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add season ranges and game exclusion filters'
          git push
