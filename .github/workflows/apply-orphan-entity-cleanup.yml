name: Apply orphan entity cleanup

on:
  push:
    paths:
      - '.github/workflows/apply-orphan-entity-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Firebase entity cleanup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('firebase-app.js')
          text = path.read_text(encoding='utf-8')

          entity_id_block = '''    function entityCardId(type, value) {
      const safeType = String(type || "").trim().toLowerCase().replace(/[^a-z]+/g, "");
      const safeValue = String(value || "").trim().toLowerCase().replace(/[^a-zа-яё0-9]+/gi, "_").replace(/^_+|_+$/g, "").slice(0, 120);
      if (!safeType || !safeValue) throw new Error("Не удалось определить альбом");
      return safeType + "__" + safeValue;
    }
'''

          cleanup_block = entity_id_block + '''
    const ENTITY_CARD_FIELDS = ["studios", "performers", "directors", "franchises"];

    function openingEntityReferences(opening) {
      const references = new Map();
      ENTITY_CARD_FIELDS.forEach(type => {
        cleanArray(opening && opening[type]).forEach(value => {
          try {
            const id = entityCardId(type, value);
            if (!references.has(id)) references.set(id, { id, type, value });
          } catch (_) {}
        });
      });
      return references;
    }

    async function deleteEntityCardsById(ids) {
      const uniqueIds = [...new Set((ids || []).map(String).filter(Boolean))];
      if (!uniqueIds.length) return [];
      const results = await Promise.allSettled(uniqueIds.map(id => deleteDoc(doc(db, "entityCards", id))));
      const deleted = [];
      results.forEach((result, index) => {
        if (result.status === "fulfilled") deleted.push(uniqueIds[index]);
        else console.warn("Could not delete orphan entity card", uniqueIds[index], result.reason);
      });
      return deleted;
    }

    async function removeOrphanEntityCards(candidates) {
      const candidateIds = new Set();
      (candidates || []).forEach(candidate => {
        try {
          candidateIds.add(candidate && candidate.id ? String(candidate.id) : entityCardId(candidate.type, candidate.value));
        } catch (_) {}
      });
      if (!candidateIds.size) return [];

      const openingsSnapshot = await getDocs(collection(db, "openings"));
      openingsSnapshot.docs.forEach(openingDoc => {
        openingEntityReferences(openingDoc.data()).forEach((_, id) => candidateIds.delete(id));
      });
      return deleteEntityCardsById([...candidateIds]);
    }

    async function pruneOrphanEntityCards() {
      const [openingsSnapshot, cardsSnapshot] = await Promise.all([
        getDocs(collection(db, "openings")),
        getDocs(collection(db, "entityCards"))
      ]);
      const liveIds = new Set();
      openingsSnapshot.docs.forEach(openingDoc => {
        openingEntityReferences(openingDoc.data()).forEach((_, id) => liveIds.add(id));
      });
      const staleIds = cardsSnapshot.docs.map(cardDoc => cardDoc.id).filter(id => !liveIds.has(id));
      return deleteEntityCardsById(staleIds);
    }

    function pruneOrphanEntityCardsForAdmin() {
      const uid = currentUserUid();
      if (!uid || !adminUids.includes(uid)) return;
      void pruneOrphanEntityCards().catch(error => console.warn("Orphan entity card cleanup failed", error));
    }
'''

          if 'const ENTITY_CARD_FIELDS' not in text:
              if text.count(entity_id_block) != 1:
                  raise RuntimeError('entityCardId block mismatch')
              text = text.replace(entity_id_block, cleanup_block, 1)

          old_update = '''    async function updateOpening(openingId, opening) {
      const safeOpeningId = String(openingId || "").trim();
      if (!safeOpeningId) throw new Error("Не найден id трека");
      return updateDoc(doc(db, "openings", safeOpeningId), cleanOpening(opening, false));
    }

    async function deleteOpening(openingId) {
      const safeOpeningId = String(openingId || "").trim();
      if (!safeOpeningId) throw new Error("Не найден id трека");
      return deleteDoc(doc(db, "openings", safeOpeningId));
    }
'''

          new_update = '''    async function updateOpening(openingId, opening) {
      const safeOpeningId = String(openingId || "").trim();
      if (!safeOpeningId) throw new Error("Не найден id трека");
      const openingRef = doc(db, "openings", safeOpeningId);
      const previousSnapshot = await getDoc(openingRef);
      const previous = previousSnapshot.exists() ? previousSnapshot.data() : {};
      const next = cleanOpening(opening, false);
      await updateDoc(openingRef, next);

      const previousReferences = openingEntityReferences(previous);
      const nextReferences = openingEntityReferences(next);
      const removedReferences = [...previousReferences.values()].filter(reference => !nextReferences.has(reference.id));
      if (removedReferences.length) await removeOrphanEntityCards(removedReferences);
      return true;
    }

    async function deleteOpening(openingId) {
      const safeOpeningId = String(openingId || "").trim();
      if (!safeOpeningId) throw new Error("Не найден id трека");
      const openingRef = doc(db, "openings", safeOpeningId);
      const previousSnapshot = await getDoc(openingRef);
      const previousReferences = previousSnapshot.exists() ? [...openingEntityReferences(previousSnapshot.data()).values()] : [];
      await deleteDoc(openingRef);
      if (previousReferences.length) await removeOrphanEntityCards(previousReferences);
      return true;
    }
'''

          if old_update in text:
              text = text.replace(old_update, new_update, 1)
          elif 'const previousReferences = openingEntityReferences(previous);' not in text:
              raise RuntimeError('update/delete opening block mismatch')

          resume_old = '''      const user = auth.currentUser;
      if (!user || user.isAnonymous) return null;
      const cachedProfile = cachedAccountProfile(user.uid);
'''
          resume_new = '''      const user = auth.currentUser;
      if (!user || user.isAnonymous) return null;
      pruneOrphanEntityCardsForAdmin();
      const cachedProfile = cachedAccountProfile(user.uid);
'''
          if resume_old in text:
              text = text.replace(resume_old, resume_new, 1)
          elif 'pruneOrphanEntityCardsForAdmin();\n      const cachedProfile' not in text:
              raise RuntimeError('resume account block mismatch')

          login_old = '''      await scrubLegacyProfileEmails();
      return { user: credential.user, profile };
'''
          login_new = '''      await scrubLegacyProfileEmails();
      pruneOrphanEntityCardsForAdmin();
      return { user: credential.user, profile };
'''
          if login_old in text:
              text = text.replace(login_old, login_new, 1)
          elif 'await scrubLegacyProfileEmails();\n      pruneOrphanEntityCardsForAdmin();' not in text:
              raise RuntimeError('login cleanup block mismatch')

          init_old = '''      if (typeof auth.authStateReady === 'function') await auth.authStateReady();
      if (auth.currentUser) return auth.currentUser;
'''
          init_new = '''      if (typeof auth.authStateReady === 'function') await auth.authStateReady();
      if (auth.currentUser) {
        pruneOrphanEntityCardsForAdmin();
        return auth.currentUser;
      }
'''
          if init_old in text:
              text = text.replace(init_old, init_new, 1)
          elif 'pruneOrphanEntityCardsForAdmin();\n        return auth.currentUser;' not in text:
              raise RuntimeError('init cleanup block mismatch')

          export_old = '''      deleteEntityCard,
      saveManualRanks,
'''
          export_new = '''      deleteEntityCard,
      pruneOrphanEntityCards,
      saveManualRanks,
'''
          if export_old in text:
              text = text.replace(export_old, export_new, 1)
          elif 'pruneOrphanEntityCards,' not in text:
              raise RuntimeError('export block mismatch')

          path.write_text(text, encoding='utf-8')

          html_path = Path('index.html')
          html = html_path.read_text(encoding='utf-8')
          html = html.replace('firebase-app.js?v=20260723-force2', 'firebase-app.js?v=20260724-orphan-entities1')
          html_path.write_text(html, encoding='utf-8')
          PY
          node --check firebase-app.js
          grep -q 'pruneOrphanEntityCards' firebase-app.js
          grep -q 'firebase-app.js?v=20260724-orphan-entities1' index.html
          rm .github/workflows/apply-orphan-entity-cleanup.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add firebase-app.js index.html .github/workflows/apply-orphan-entity-cleanup.yml
          git commit -m 'Remove orphan entity cards from Firebase'
          git push
