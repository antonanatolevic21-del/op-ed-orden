<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0" />
  <title>АБОБА</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      background: #0B0A10;
      color: #F5F3FA;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 1px solid #2A2435;
      padding-bottom: 16px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(90deg, #FF2E63, #08D9D6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { color: #8B8698; font-size: 13px; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #2A2435;
      background: #16121F;
      color: #8B8698;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .tab:hover { border-color: #08D9D6; color: #08D9D6; transform: scale(1.03); }
    .tab.active { border-color: #FF2E63; color: #FF2E63; background: rgba(255,46,99,0.1); }
    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: #16121F;
      border: 1px solid #2A2435;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 50px 70px 1fr auto;
      gap: 16px;
      align-items: center;
      transition: all 0.15s;
    }
    .card:hover { transform: scale(1.01); border-color: #3A3350; }
    .card:active { transform: scale(0.98); }
    .rank {
      font-size: 22px;
      font-weight: 900;
      color: #8B8698;
      text-align: center;
    }
    .rank.gold { color: #FFC857; }
    .rank.silver { color: #C9CBD4; }
    .rank.bronze { color: #D8935A; }
    .thumb {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      background: #0B0A10;
      border: 1px solid #2A2435;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #8B8698;
      overflow: hidden;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .info { min-width: 0; }
    .name { font-weight: 600; font-size: 16px; }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      display: inline-block;
      margin-left: 6px;
    }
    .tag.OP { background: rgba(8,217,214,0.15); color: #08D9D6; border: 1px solid rgba(8,217,214,0.3); }
    .tag.ED { background: rgba(255,46,99,0.15); color: #FF2E63; border: 1px solid rgba(255,46,99,0.3); }
    .meta { color: #8B8698; font-size: 12px; margin-top: 4px; }
    .score { font-size: 18px; font-weight: 700; color: #08D9D6; }
    .rate-area { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .rate-row { display: flex; align-items: center; gap: 8px; }
    .rate-row input[type=range] { width: 100px; accent-color: #FF2E63; }
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #FF2E63; color: #0B0A10; }
    .btn-primary:hover { background: #ff4d78; }
    .btn-secondary { background: transparent; border: 1px solid #08D9D6; color: #08D9D6; }
    .btn-secondary:hover { background: rgba(8,217,214,0.1); }
    .btn-danger { background: transparent; border: none; color: #8B8698; font-size: 11px; }
    .btn-danger:hover { color: #FF2E63; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    .add-form {
      background: #16121F;
      border: 1px solid #2A2435;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .form-grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .add-form input, .add-form select {
      background: #0F0C16;
      border: 1px solid #2A2435;
      color: #F5F3FA;
      padding: 10px 12px;
      border-radius: 8px;
      width: 100%;
      font-size: 13px;
    }
    .add-form input:focus, .add-form select:focus { outline: 2px solid #FF2E63; }
    .filter-bar {
      background: #16121F;
      border: 1px solid #2A2435;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .filter-grid .field { display: flex; flex-direction: column; gap: 4px; }
    .filter-grid label { font-size: 10px; color: #8B8698; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-grid input, .filter-grid select {
      background: #0F0C16;
      border: 1px solid #2A2435;
      color: #F5F3FA;
      padding: 8px 10px;
      border-radius: 8px;
      width: 100%;
      font-size: 12px;
    }
    .filter-grid select[multiple] { min-height: 60px; }
    .empty { text-align: center; padding: 40px; color: #8B8698; border: 1px dashed #2A2435; border-radius: 12px; }
    .status { color: #8B8698; font-size: 12px; text-align: center; margin-top: 20px; font-family: monospace; }
    .hint { color: #8B8698; font-size: 11px; margin-top: 4px; }

    @media (max-width: 700px) {
      .card { grid-template-columns: 1fr; gap: 8px; }
      .form-grid, .form-grid2 { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: stretch; }
      .rate-area { align-items: flex-start; width: 100%; }
      .rate-row { width: 100%; }
      .rate-row input[type=range] { flex: 1; }
    }

    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: #0F0C16;
      border: 1px solid #2A2435;
      font-size: 10px;
      color: #8B8698;
      margin: 2px;
    }
    .chip.mine { border-color: #FF2E63; color: #FF2E63; }
    .votes { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    .password-modal {
      position: fixed;
      inset: 0;
      background: rgba(11,10,16,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .password-modal.hidden { display: none; }
    .password-box {
      background: #16121F;
      border: 1px solid #FF2E63;
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .password-box h2 { margin-bottom: 12px; }
    .password-box input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #2A2435;
      background: #0F0C16;
      color: #F5F3FA;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .password-box input:focus { outline: 2px solid #FF2E63; }
    .password-error { color: #FF2E63; font-size: 12px; min-height: 20px; }
  </style>
</head>
<body>
<div class="container" id="app">
  <div id="passwordModal" class="password-modal">
    <div class="password-box">
      <h2>🔐 Вход</h2>
      <p style="color:#8B8698;font-size:13px;">Введите пароль для доступа</p>
      <input type="password" id="passwordInput" placeholder="Пароль" />
      <div class="password-error" id="passwordError"></div>
      <button class="btn btn-primary" id="passwordSubmit" style="width:100%;padding:12px;">Войти</button>
    </div>
  </div>

  <div class="header">
    <div>
      <div class="title">АБОБА</div>
      <div class="sub">общий рейтинг опенингов и эндингов · оценки 1–10</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <input id="myName" placeholder="Ваше имя" style="background:#16121F;border:1px solid #2A2435;color:#F5F3FA;padding:8px 12px;border-radius:6px;width:140px;" />
      <span id="avatarDisplay" style="font-size:24px;">🙂</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="chart">Общий чарт</button>
    <button class="tab" data-tab="profile">Профиль</button>
    <button class="tab" data-tab="season">Сезоны</button>
    <button class="tab" data-tab="tier">Тир-лист</button>
    <button class="tab" data-tab="stats">Средние</button>
    <button class="tab" data-tab="top100">Топ-100</button>
  </div>

  <!-- Панель: Общий чарт -->
  <div id="panel-chart" class="panel active">
    <div class="add-form">
      <div style="font-family:monospace;font-size:11px;color:#08D9D6;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;">+ добавить трек</div>
      <div class="form-grid">
        <input id="addTitle" placeholder="Название (аниме — OP/ED N)" />
        <select id="addType"><option value="OP">OP</option><option value="ED">ED</option></select>
        <input id="addYear" type="number" placeholder="Год" />
      </div>
      <div class="form-grid2">
        <input id="addStudio" placeholder="Студии (через запятую)" />
        <input id="addDirector" placeholder="Режиссёры (через запятую)" />
        <input id="addPerformer" placeholder="Исполнители (через запятую)" />
        <input id="addFranchise" placeholder="Франшизы (через запятую)" />
      </div>
      <div class="form-grid" style="grid-template-columns:1fr 1fr auto;">
        <input id="addImage" placeholder="Картинка (URL)" />
        <input id="addLink" placeholder="Ссылка" />
        <button class="btn btn-primary" id="addBtn">Добавить</button>
      </div>
      <div class="hint">Несколько значений через запятую, например: "MAPPA, WIT Studio"</div>
    </div>

    <div class="filter-bar">
      <div style="font-family:monospace;font-size:11px;color:#08D9D6;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;">фильтры</div>
      <div class="filter-grid">
        <div class="field"><label>Поиск</label><input id="fSearch" placeholder="Название, исполнитель..." /></div>
        <div class="field"><label>Тип</label><select id="fType"><option value="">Все</option><option value="OP">OP</option><option value="ED">ED</option></select></div>
        <div class="field"><label>Год</label><select id="fYear"><option value="">Все</option></select></div>
        <div class="field"><label>Сезон</label><select id="fSeason"><option value="">Все</option><option value="winter">Зима</option><option value="spring">Весна</option><option value="summer">Лето</option><option value="fall">Осень</option></select></div>
        <div class="field"><label>Студии</label><select id="fStudio" multiple></select></div>
        <div class="field"><label>Исполнители</label><select id="fPerformer" multiple></select></div>
        <div class="field"><label>Оценка от</label><input type="number" id="fScoreMin" min="1" max="10" step="0.5" placeholder="мин" /></div>
        <div class="field"><label>до</label><input type="number" id="fScoreMax" min="1" max="10" step="0.5" placeholder="макс" /></div>
        <div class="field"><label>Сортировка</label><select id="fSort"><option value="score">По рейтингу</option><option value="year">По году</option><option value="title">По названию</option></select></div>
        <button class="btn btn-secondary" id="resetFilters" style="height:38px;">Сбросить</button>
      </div>
    </div>

    <div id="resultCount" style="font-family:monospace;font-size:12px;color:#8B8698;margin-bottom:12px;"></div>
    <div id="listContainer"><div class="empty">Загрузка...</div></div>
  </div>

  <!-- Панель: Профиль -->
  <div id="panel-profile" class="panel">
    <div class="filter-bar">
      <div style="font-family:monospace;font-size:11px;color:#08D9D6;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;">фильтры профиля</div>
      <div class="filter-grid">
        <div class="field"><label>Поиск</label><input id="pSearch" placeholder="Название..." /></div>
        <div class="field"><label>Тип</label><select id="pType"><option value="">Все</option><option value="OP">OP</option><option value="ED">ED</option></select></div>
        <div class="field"><label>Год</label><select id="pYear"><option value="">Все</option></select></div>
        <div class="field"><label>Студии</label><select id="pStudio" multiple></select></div>
        <div class="field"><label>Исполнители</label><select id="pPerformer" multiple></select></div>
        <button class="btn btn-secondary" id="pResetFilters" style="height:38px;">Сбросить</button>
      </div>
    </div>
    <div id="profileStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;"></div>
    <div id="profileList"><div class="empty">Выберите пользователя</div></div>
  </div>

  <!-- Панель: Сезоны -->
  <div id="panel-season" class="panel">
    <div id="seasonContent"><div class="empty">Загрузка...</div></div>
  </div>

  <!-- Панель: Тир-лист -->
  <div id="panel-tier" class="panel">
    <div id="tierContent"><div class="empty">Загрузка...</div></div>
  </div>

  <!-- Панель: Средние -->
  <div id="panel-stats" class="panel">
    <div id="statsContent"><div class="empty">Загрузка...</div></div>
  </div>

  <!-- Панель: Топ-100 -->
  <div id="panel-top100" class="panel">
    <div id="top100Content"><div class="empty">Загрузка...</div></div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
(function() {
  // ========== ПАРОЛЬ ==========
  const PASSWORD = '6664352';
  let authenticated = false;

  const passwordModal = document.getElementById('passwordModal');
  const passwordInput = document.getElementById('passwordInput');
  const passwordSubmit = document.getElementById('passwordSubmit');
  const passwordError = document.getElementById('passwordError');

  function checkPassword() {
    if (passwordInput.value.trim() === PASSWORD) {
      authenticated = true;
      passwordModal.classList.add('hidden');
      initApp();
    } else {
      passwordError.textContent = 'Неверный пароль';
    }
  }
  passwordSubmit.addEventListener('click', checkPassword);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

  // ========== ДАННЫЕ ==========
  let entries = [];
  let myName = '';
  let myAvatar = '🙂';
  let ratings = {}; // { openingId: { voter: score } }
  let manualRanks = {}; // { voter: { OP: [id1,id2], ED: [id1,id2] } }

  const STORAGE_KEY = 'aboba_data';
  const NAME_KEY = 'aboba_name';
  const AVATAR_KEY = 'aboba_avatar';
  const MANUAL_KEY = 'aboba_manual';

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) entries = JSON.parse(raw);
    } catch(e) { entries = []; }
    try {
      const raw = localStorage.getItem(NAME_KEY);
      if (raw) myName = raw;
      document.getElementById('myName').value = myName;
    } catch(e) {}
    try {
      const raw = localStorage.getItem(AVATAR_KEY);
      if (raw) myAvatar = raw;
      document.getElementById('avatarDisplay').textContent = myAvatar;
    } catch(e) {}
    try {
      const raw = localStorage.getItem(MANUAL_KEY);
      if (raw) manualRanks = JSON.parse(raw);
    } catch(e) { manualRanks = {}; }
    if (!entries.length) {
      entries = [
        { id: '1', title: 'Kaguya-sama OP 1', type: 'OP', year: 2019, season: 'winter', studios: ['A-1 Pictures'], directors: ['Mamoru Hatakeyama'], performers: ['Masayuki Suzuki'], image: '', link: '' },
        { id: '2', title: 'Samurai Champloo ED', type: 'ED', year: 2004, season: 'spring', studios: ['Manglobe'], directors: ['Shinichirō Watanabe'], performers: ['MINMI'], image: '', link: '' },
        { id: '3', title: 'Bleach OP 13', type: 'OP', year: 2010, season: 'fall', studios: ['Studio Pierrot'], directors: ['Noriyuki Abe'], performers: ['SID'], image: '', link: '' },
        { id: '4', title: 'Evangelion OP', type: 'OP', year: 1995, season: 'fall', studios: ['Gainax'], directors: ['Hideaki Anno'], performers: ['Yoko Takahashi'], image: '', link: '' },
        { id: '5', title: 'Cowboy Bebop OP', type: 'OP', year: 1998, season: 'spring', studios: ['Sunrise'], directors: ['Shinichirō Watanabe'], performers: ['The Seatbelts'], image: '', link: '' },
      ];
      ratings = {
        '1': { 'Иван': 9, 'Аня': 8, 'Макс': 7 },
        '2': { 'Иван': 8, 'Аня': 9 },
        '3': { 'Иван': 7, 'Макс': 8 },
        '4': { 'Иван': 10, 'Аня': 9, 'Макс': 9 },
        '5': { 'Иван': 9, 'Аня': 10 }
      };
      saveData();
    }
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    localStorage.setItem(NAME_KEY, myName);
    localStorage.setItem(AVATAR_KEY, myAvatar);
    localStorage.setItem(MANUAL_KEY, JSON.stringify(manualRanks));
  }

  function saveName() {
    myName = document.getElementById('myName').value.trim();
    localStorage.setItem(NAME_KEY, myName);
    renderAll();
  }

  // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
  function avg(scores) {
    const vals = Object.values(scores || {}).filter(v => v !== null && v !== undefined);
    if (!vals.length) return null;
    return vals.reduce((a,b) => a + b, 0) / vals.length;
  }

  function formatScore(v) {
    if (v === null || v === undefined) return '—';
    return Number(v).toFixed(1);
  }

  function normalizeScore(v) {
    const num = Number(v);
    if (!isFinite(num)) return null;
    return Math.max(1, Math.min(10, num));
  }

  function getScore(entry, voter) {
    return ratings[entry.id] && ratings[entry.id][voter] !== undefined ? ratings[entry.id][voter] : null;
  }

  function getMyScore(entry) {
    return myName ? getScore(entry, myName) : null;
  }

  function allVoters() {
    const set = new Set();
    Object.values(ratings).forEach(r => Object.keys(r).forEach(v => set.add(v)));
    if (myName) set.add(myName);
    return Array.from(set);
  }

  function unique(arr) { return [...new Set(arr.filter(Boolean))].sort((a,b) => a.localeCompare(b)); }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function parseList(str) {
    return (str || '').split(',').map(s => s.trim()).filter(Boolean);
  }

  function imgHtml(entry, cls) {
    const fallback = entry.type || 'OP';
    if (entry.image) {
      return `<div class="${cls}"><img src="${escapeHtml(entry.image)}" alt="${escapeHtml(entry.title)}" onerror="this.replaceWith(document.createTextNode('нет img'))" /></div>`;
    }
    return `<div class="${cls}">${fallback}</div>`;
  }

  // ========== ФИЛЬТРЫ ==========
  let filters = { search: '', type: '', year: '', season: '', studios: [], performers: [], scoreMin: '', scoreMax: '' };
  let sortMode = 'score';

  function applyFilters(list) {
    const q = filters.search.toLowerCase().trim();
    return list.filter(e => {
      if (q) {
        const hay = [e.title, e.type, e.year, ...(e.studios||[]), ...(e.performers||[]), ...(e.directors||[]), ...(e.franchises||[])].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      if (filters.type && e.type !== filters.type) return false;
      if (filters.year && String(e.year) !== filters.year) return false;
      if (filters.season && e.season !== filters.season) return false;
      if (filters.studios.length && !filters.studios.some(s => (e.studios||[]).includes(s))) return false;
      if (filters.performers.length && !filters.performers.some(s => (e.performers||[]).includes(s))) return false;
      const sc = avg(ratings[e.id]);
      if (filters.scoreMin && sc !== null && sc < Number(filters.scoreMin)) return false;
      if (filters.scoreMax && sc !== null && sc > Number(filters.scoreMax)) return false;
      return true;
    });
  }

  function applySort(list) {
    return [...list].sort((a,b) => {
      if (sortMode === 'title') return a.title.localeCompare(b.title, 'ru');
      if (sortMode === 'year') return (b.year || 0) - (a.year || 0);
      const sa = avg(ratings[a.id]);
      const sb = avg(ratings[b.id]);
      if (sa === null && sb === null) return 0;
      if (sa === null) return 1;
      if (sb === null) return -1;
      return sb - sa;
    });
  }

  // ========== РЕНДЕРИНГ ==========
  function renderList() {
    const container = document.getElementById('listContainer');
    const filtered = applyFilters(entries);
    const sorted = applySort(filtered);
    document.getElementById('resultCount').textContent = `Показано: ${sorted.length} из ${entries.length}`;

    if (!sorted.length) {
      container.innerHTML = '<div class="empty">Ничего не найдено</div>';
      return;
    }

    container.innerHTML = sorted.map((e, i) => {
      const sc = avg(ratings[e.id]);
      const mySc = getMyScore(e);
      const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const chips = Object.entries(ratings[e.id] || {}).map(([voter, val]) => {
        const mine = voter === myName ? ' mine' : '';
        return `<span class="chip${mine}">${voter}: ${val}</span>`;
      }).join('');

      return `
        <div class="card">
          <div class="rank ${rankClass}">${i + 1}</div>
          ${imgHtml(e, 'thumb')}
          <div class="info">
            <div><span class="name">${escapeHtml(e.title)}</span><span class="tag ${e.type}">${e.type}</span>${e.year ? ` <span style="font-size:11px;color:#8B8698;">${e.year}</span>` : ''}</div>
            ${e.studios?.length ? `<div class="meta">студия: ${e.studios.join(', ')}</div>` : ''}
            ${e.performers?.length ? `<div class="meta">исполнитель: ${e.performers.join(', ')}</div>` : ''}
            ${e.directors?.length ? `<div class="meta">режиссёр: ${e.directors.join(', ')}</div>` : ''}
            ${e.franchises?.length ? `<div class="meta">франшиза: ${e.franchises.join(', ')}</div>` : ''}
            ${e.link ? `<div class="meta"><a href="${escapeHtml(e.link)}" target="_blank" style="color:#08D9D6;">ссылка ↗</a></div>` : ''}
            <div class="votes">${chips}</div>
          </div>
          <div class="rate-area">
            <div class="rate-row">
              <input type="range" min="1" max="10" step="0.5" value="${mySc !== null ? mySc : 5}" data-id="${e.id}" />
              <span style="font-weight:700;width:24px;text-align:center;">${mySc !== null ? mySc : '—'}</span>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button class="btn btn-primary btn-sm" data-rate="${e.id}">Оценить</button>
              ${mySc !== null ? `<button class="btn btn-danger btn-sm" data-delete="${e.id}">удалить</button>` : ''}
              <button class="btn btn-secondary btn-sm" data-edit="${e.id}">✎</button>
              <button class="btn btn-danger btn-sm" data-delete-op="${e.id}">✕</button>

            <div style="font-size:14px;font-weight:700;color:#08D9D6;">${formatScore(sc)}</div>
          </div>

    container.querySelectorAll('[data-rate]').forEach(btn => {

        const id = btn.dataset.rate;
        const slider = container.querySelector(`input[type=range][data-id="${id}"]`);
        const val = normalizeScore(slider.value);
        if (!myName) { alert('Введите имя'); return; }
        if (!ratings[id]) ratings[id] = {};
        ratings[id][myName] = val;
        saveData();
        renderAll();
        setStatus('Оценка сохранена ✓');
      });
    });

    container.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.delete;
        if (ratings[id]) delete ratings[id][myName];
        if (Object.keys(ratings[id] || {}).length === 0) delete ratings[id];
        saveData();
        renderAll();
        setStatus('Оценка удалена');
      });
    });

    container.querySelectorAll('[data-delete-op]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('Удалить трек?')) return;
        const id = btn.dataset.deleteOp;
        entries = entries.filter(e => e.id !== id);
        delete ratings[id];
        saveData();
        renderAll();
        setStatus('Трек удалён');
      });
    });

    container.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.edit;
        const e = entries.find(x => x.id === id);
        if (!e) return;
        const title = prompt('Название:', e.title);
        if (title !== null && title.trim()) e.title = title.trim();
        const year = prompt('Год:', e.year);
        if (year !== null) e.year = parseInt(year) || null;
        saveData();
        renderAll();
        setStatus('Обновлено');
      });
    });

    container.querySelectorAll('input[type=range]').forEach(slider => {
      slider.addEventListener('input', function() {
        const val = this.value;
        this.parentElement.querySelector('span').textContent = val;
      });
    });
  }

  function renderFilters() {
    const years = unique(entries.map(e => e.year ? String(e.year) : '')).sort((a,b) => b - a);

    const performers = unique(entries.flatMap(e => e.performers || []));

    const fillSelect = (id, values, selected) => {
      const el = document.getElementById(id);
      if (!el) return;
      const current = el.value;
      el.innerHTML = values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
      if (selected) {
        Array.from(el.options).forEach(opt => opt.selected = selected.includes(opt.value));
      }
      if (!selected && years.includes(current)) el.value = current;
    };

    const yearSel = document.getElementById('fYear');
    yearSel.innerHTML = '<option value="">Все</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
    const pYear = document.getElementById('pYear');
    pYear.innerHTML = '<option value="">Все</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');

    fillSelect('fStudio', studios, filters.studios);
    fillSelect('fPerformer', performers, filters.performers);
    fillSelect('pStudio', studios, []);
    fillSelect('pPerformer', performers, []);

  function renderProfile() {
    const container = document.getElementById('profileList');
    const voters = allVoters();
    if (!voters.length) {
      container.innerHTML = '<div class="empty">Нет оценок</div>';
      return;
    }

    // Выбор пользователя для профиля
    let html = `<div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <label style="font-size:12px;color:#8B8698;">Профиль:</label>
      <select id="profileUserSelect" style="background:#0F0C16;border:1px solid #2A2435;color:#F5F3FA;padding:8px 12px;border-radius:8px;">
        ${voters.map(v => `<option value="${escapeHtml(v)}">${v}</option>`).join('')}
      </select>
    </div>`;

    const profileUser = document.getElementById('profileUserSelect')?.value || voters[0] || '';

    // Статистика
    const rated = entries.filter(e => ratings[e.id] && ratings[e.id][profileUser] !== undefined);
    const opRated = rated.filter(e => e.type === 'OP');
    const edRated = rated.filter(e => e.type === 'ED');
    const avgOp = opRated.length ? opRated.reduce((s,e) => s + ratings[e.id][profileUser], 0) / opRated.length : null;
    const avgEd = edRated.length ? edRated.reduce((s,e) => s + ratings[e.id][profileUser], 0) / edRated.length : null;
    const avgAll = rated.length ? rated.reduce((s,e) => s + ratings[e.id][profileUser], 0) / rated.length : null;

    const statsHtml = `
      <div class="stat-card"><div class="stat-label">Средняя OP</div><div class="stat-value">${formatScore(avgOp)}</div><div class="stat-sub">${opRated.length} треков</div></div>
      <div class="stat-card"><div class="stat-label">Средняя ED</div><div class="stat-value">${formatScore(avgEd)}</div><div class="stat-sub">${edRated.length} треков</div></div>
      <div class="stat-card"><div class="stat-label">Средняя всего</div><div class="stat-value">${formatScore(avgAll)}</div><div class="stat-sub">${rated.length} треков</div></div>
    `;
    document.getElementById('profileStats').innerHTML = statsHtml;

    // Топ-100 по оценке (без ручного)
    const opTop = rated.filter(e => e.type === 'OP').sort((a,b) => (ratings[b.id]?.[profileUser] || 0) - (ratings[a.id]?.[profileUser] || 0)).slice(0, 100);
    const edTop = rated.filter(e => e.type === 'ED').sort((a,b) => (ratings[b.id]?.[profileUser] || 0) - (ratings[a.id]?.[profileUser] || 0)).slice(0, 100);

    function renderTop(list, type) {
      if (!list.length) return '<div class="empty">Нет оценок</div>';
      return list.map((e, i) => `
        <div style="display:grid;grid-template-columns:30px 44px 1fr 60px;gap:10px;align-items:center;background:#16121F;border:1px solid #2A2435;border-radius:8px;padding:8px 12px;margin-bottom:6px;">
          <div style="font-weight:900;color:#8B8698;text-align:center;">${i + 1}</div>
          ${imgHtml(e, 'thumb')}
          <div><div style="font-weight:600;">${escapeHtml(e.title)}</div><div style="font-size:11px;color:#8B8698;">${e.year || ''}</div></div>
          <div style="font-weight:700;color:#08D9D6;">${ratings[e.id]?.[profileUser] || '—'}</div>
        </div>
      `).join('');
    }

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div><div style="font-weight:900;color:#08D9D6;margin-bottom:12px;">Топ-100 OP</div>${renderTop(opTop, 'OP')}</div>
      <div><div style="font-weight:900;color:#FF2E63;margin-bottom:12px;">Топ-100 ED</div>${renderTop(edTop, 'ED')}</div>
    </div>`;

    // Все оценки
    html += `<div style="margin-top:24px;"><div style="font-family:monospace;font-size:11px;color:#08D9D6;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;">все оценки</div>`;
    const allRatings = rated.sort((a,b) => (ratings[b.id]?.[profileUser] || 0) - (ratings[a.id]?.[profileUser] || 0));
    html += allRatings.map(e => `
      <div style="display:grid;grid-template-columns:50px 44px 1fr 60px;gap:10px;align-items:center;background:#16121F;border:1px solid #2A2435;border-radius:8px;padding:8px 12px;margin-bottom:4px;">
        <div style="font-weight:700;">${ratings[e.id]?.[profileUser] || '—'}</div>

        <div style="font-size:12px;color:#8B8698;">${e.performers?.join(', ') || ''}</div>
      </div>
    `).join('');
    html += '</div>';

    container.innerHTML = html;

    // Обработчик выбора пользователя
    const sel = document.getElementById('profileUserSelect');
    if (sel) {
      sel.addEventListener('change', () => renderProfile());
      // Если пользователь не выбран, выбираем текущего
      if (!sel.value && myName && voters.includes(myName)) sel.value = myName;
    }
  }

  function renderSeason() {
    const container = document.getElementById('seasonContent');
    const years = unique(entries.map(e => e.year ? String(e.year) : '')).sort((a,b) => b - a);

      el.addEventListener('click', function() {

          const list = entries.filter(e => e.year == year && e.season === s);

          html2 += `<div style="background:#0F0C16;border:1px solid #2A2435;border-radius:8px;padding:10px;margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-weight:600;">${seasonMap[s]}</span>
              <span style="color:#8B8698;font-size:12px;">${rated.length}/${list.length} оценено</span>
              ${list.length ? `<button class="btn btn-primary btn-sm" data-season-rate="${year}|${s}">Оценить</button>` : ''}
            </div>
            ${list.slice(0,5).map(e => `<div style="font-size:13px;padding:4px 0;border-bottom:1px solid #1a1625;">${escapeHtml(e.title)} ${ratings[e.id]?.[myName] ? '⭐' + ratings[e.id][myName] : ''}</div>`).join('')}
            ${list.length > 5 ? `<div style="color:#8B8698;font-size:11px;">+ ещё ${list.length - 5}</div>` : ''}
          </div>`;
        });
        rightPanel.innerHTML = html2;

        rightPanel.querySelectorAll('[data-season-rate]').forEach(btn => {
          btn.addEventListener('click', function() {
            const [year, season] = this.dataset.seasonRate.split('|');
            const list = entries.filter(e => e.year == year && e.season === season);
            let idx = 0;
            function next() {
              if (idx >= list.length) { setStatus('Сезон оценён!'); return; }
              const e = list[idx];
              const val = prompt(`Оцените (1-10): ${e.title}`, ratings[e.id]?.[myName] || 5);
              if (val === null) return;
              const num = normalizeScore(val);
              if (num === null) { alert('Введите число от 1 до 10'); return; }
              if (!ratings[e.id]) ratings[e.id] = {};
              ratings[e.id][myName] = num;
              saveData();
              idx++;
              next();
            }
            next();
          });
        });
      });
    });
  }

    if (!myName) {
      container.innerHTML = '<div class="empty">Введите имя для тир-листа</div>';
      return;
    }

  function renderStats() {
    const container = document.getElementById('statsContent');
    const all = entries.filter(e => Object.values(ratings[e.id] || {}).length >= 3);

    function calcGroup(list, keyFn) {
      const groups = {};
      list.forEach(e => {
        const sc = avg(ratings[e.id]);
        if (sc === null) return;
        const keys = keyFn(e);
        keys.forEach(k => {
          if (!k) return;
          if (!groups[k]) groups[k] = [];
          groups[k].push(sc);
        });
      });
      return Object.entries(groups)
        .map(([k, vals]) => ({ key: k, count: vals.length, mean: vals.reduce((a,b) => a + b, 0) / vals.length }))
        .filter(x => x.count >= 3)
        .sort((a,b) => b.mean - a.mean)
        .slice(0, 10);
    }

    const studios = calcGroup(all, e => e.studios || []);
    const performers = calcGroup(all, e => e.performers || []);
    const directors = calcGroup(all, e => e.directors || []);
    const franchises = calcGroup(all, e => e.franchises || []);

    function renderTable(data, title) {
      if (!data.length) return `<div class="empty">Нет данных</div>`;
      return `<div style="font-weight:bold;margin:8px 0 6px;">${title}</div>` + data.map((d, i) =>
        `<div style="display:grid;grid-template-columns:30px 1fr 60px 50px;gap:8px;padding:4px 0;border-bottom:1px solid #1a1625;font-size:13px;">
          <span style="color:#8B8698;">${i+1}</span>
          <span>${escapeHtml(d.key)}</span>
          <span style="color:#08D9D6;font-weight:700;">${formatScore(d.mean)}</span>
          <span style="color:#8B8698;font-size:11px;">${d.count}</span>
        </div>`
      ).join('');
    }

    container.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div style="background:#16121F;border:1px solid #2A2435;border-radius:12px;padding:16px;">${renderTable(performers, 'Исполнители')}</div>
        <div style="background:#16121F;border:1px solid #2A2435;border-radius:12px;padding:16px;">${renderTable(studios, 'Студии')}</div>
        <div style="background:#16121F;border:1px solid #2A2435;border-radius:12px;padding:16px;">${renderTable(directors, 'Режиссёры')}</div>
        <div style="background:#16121F;border:1px solid #2A2435;border-radius:12px;padding:16px;">${renderTable(franchises, 'Франшизы')}</div>
      </div>
    `;
  }

    const type = document.getElementById('top100Type')?.value || 'OP';
    const list = entries.filter(e => e.type === type && Object.values(ratings[e.id] || {}).length >= 3)

          <option value="OP" ${type === 'OP' ? 'selected' : ''}>OP</option>
          <option value="ED" ${type === 'ED' ? 'selected' : ''}>ED</option>
        </select>
      </div>
      ${list.map((e, i) => `
        <div style="display:grid;grid-template-columns:40px 50px 1fr 60px;gap:12px;align-items:center;background:#16121F;border:1px solid #2A2435;border-radius:8px;padding:8px 12px;margin-bottom:4px;">
          <div style="font-weight:900;color:${i < 3 ? '#FFC857' : '#8B8698'};">${i + 1}</div>
          ${imgHtml(e, 'thumb')}
          <div><div style="font-weight:600;">${escapeHtml(e.title)}</div><div style="font-size:11px;color:#8B8698;">${e.type} · ${e.year || ''}</div></div>
          <div style="font-weight:700;color:#08D9D6;font-size:18px;">${formatScore(avg(ratings[e.id]))}</div>
        </div>
      `).join('')}
    `;

    document.getElementById('top100Type')?.addEventListener('change', renderTop100);
  }

  function renderAll() {
    renderList();
    renderFilters();
    renderProfile();
    renderSeason();
    renderTier();
    renderStats();
    renderTop100();
  }

    document.getElementById('status').textContent = msg;
    setTimeout(() => { if (document.getElementById('status').textContent === msg) document.getElementById('status').textContent = ''; }, 3000);
  }

  // ========== ВКЛАДКИ ==========
  document.querySelectorAll('.tab').forEach(tab => {

  ['fSearch','fType','fYear','fSeason','fScoreMin','fScoreMax','fSort'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', function() {
      if (id === 'fSearch') filters.search = this.value;
      else if (id === 'fType') filters.type = this.value;
      else if (id === 'fYear') filters.year = this.value;
      else if (id === 'fSeason') filters.season = this.value;
      else if (id === 'fScoreMin') filters.scoreMin = this.value;
      else if (id === 'fScoreMax') filters.scoreMax = this.value;
      else if (id === 'fSort') sortMode = this.value;
      renderList();
    });
    if (id === 'fSearch') {
      document.getElementById(id).addEventListener('input', function() {
        filters.search = this.value;
        renderList();
      });
    }
  });

  document.getElementById('fStudio')?.addEventListener('change', function() {
    filters.studios = Array.from(this.selectedOptions).map(o => o.value);
    renderList();
  });
  document.getElementById('fPerformer')?.addEventListener('change', function() {
    filters.performers = Array.from(this.selectedOptions).map(o => o.value);
    renderList();
  });

  document.getElementById('resetFilters')?.addEventListener('click', () => {
    filters = { search: '', type: '', year: '', season: '', studios: [], performers: [], scoreMin: '', scoreMax: '' };
    sortMode = 'score';
    document.getElementById('fSearch').value = '';
    document.getElementById('fType').value = '';
    document.getElementById('fYear').value = '';
    document.getElementById('fSeason').value = '';
    document.getElementById('fScoreMin').value = '';
    document.getElementById('fScoreMax').value = '';
    document.getElementById('fSort').value = 'score';
    document.getElementById('fStudio').selectedIndex = -1;
    document.getElementById('fPerformer').selectedIndex = -1;
    renderAll();
  });

  // ========== ЗАПУСК ==========
  loadData();
  renderAll();
  setStatus('Добро пожаловать!');

  // Добавляем стили для stats
  const style = document.createElement('style');
  style.textContent = `
    .stat-card { background:#16121F;border:1px solid #2A2435;border-radius:8px;padding:12px 16px; }
    .stat-label { font-size:10px;color:#8B8698;text-transform:uppercase;letter-spacing:0.5px; }
    .stat-value { font-size:22px;font-weight:900;color:#08D9D6; }
    .stat-sub { font-size:11px;color:#8B8698;margin-top:4px; }
    .thumb { width:44px;height:44px;border-radius:6px; }
  `;
  document.head.appendChild(style);

})();
</script>
</body>
</html>
